services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: speech_jobs_backend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d speech_jobs_backend"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/speech_jobs_backend
      API_HOST: 0.0.0.0
      STORAGE_ROOT: /app/storage
      INPUT_STORAGE_DIR: /app/storage/inputs
      ARTIFACT_STORAGE_DIR: /app/storage/artifacts
    volumes:
      - ./storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/speech_jobs_backend
      STORAGE_ROOT: /app/storage
      INPUT_STORAGE_DIR: /app/storage/inputs
      ARTIFACT_STORAGE_DIR: /app/storage/artifacts
    volumes:
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    command: python -m app.worker.main

volumes:
  postgres_data:
